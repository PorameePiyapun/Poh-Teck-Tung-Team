<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>End Case</title>
  <link rel="stylesheet" href="end-case.css">
</head>

<body>

<div class="container">
  <div class="card">
 
    <div class="title">🚑 End Case Report</div>

    <form id="reportForm">

      <div class="form-group">
        <label>Case ID</label>
        <select name="caseId" id="caseId" required></select>
      </div>

      <div class="form-group">
        <label>Location</label>
        <input name="location" id="location" readonly>
      </div>

      <div class="form-group">
        <label>Officer</label>
        <input name="officer" id="officer" readonly>
      </div>

      <div class="form-group">
        <label>เวลา</label>
        <input name="timestamp" id="timestamp" readonly>
      </div>

      <div class="form-group">
        <label>Latitude</label>
        <input name="lat" id="lat" readonly>
      </div>

      <div class="form-group">
        <label>Longitude</label>
        <input name="lng" id="lng" readonly>
      </div>

      <div class="form-group">
        <label>Detail</label>
        <textarea name="detail" id="detail"></textarea>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn primary">
          End Case + Generate PDF
        </button>

        <button type="button" class="btn secondary" onclick="goHome()">
          กลับหน้า Home
        </button>
      </div>

    </form>

  </div>
</div>

<script>
// โหลด case list
fetch("http://localhost:3001/api/cases")
  .then(res => res.json())
  .then(data => {
    const select = document.getElementById("caseId");
    select.innerHTML = `<option value="">-- เลือกเคส --</option>`;

    data.data.forEach(c => {
      if (c.status !== "closed") {
        select.innerHTML += `<option value="${c.id}">${c.id}</option>`;
      }
    });
  });

// เลือก case → เติมข้อมูล
document.getElementById("caseId").addEventListener("change", async function () {
  const id = this.value;
  if (!id) return;

  const res = await fetch(`http://localhost:3001/api/cases/${id}`);
  const { data } = await res.json();

  console.log("DATA:", data);

  document.getElementById("location").value = data.location || "-";
  document.getElementById("officer").value = data.assignedOfficer || "-";

  document.getElementById("lat").value =
    data.incidentGps?.lat || "-";

  document.getElementById("lng").value =
    data.incidentGps?.lng || "-";

  document.getElementById("timestamp").value =
    data.closedAt
      ? new Date(data.closedAt).toLocaleString("th-TH")
      : data.createdAt
      ? new Date(data.createdAt).toLocaleString("th-TH")
      : "-";

  // 🔥 FIX: รองรับรูป
  if (data.incidentPhoto) {
    window.currentImages = [data.incidentPhoto];
    console.log("📸 มีรูป:", data.incidentPhoto);
  } else {
    window.currentImages = [];
    console.log("❌ ไม่มีรูปในเคสนี้");
  }
});

// submit
document.getElementById("reportForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const formData = new FormData();

  formData.append("caseId", document.getElementById("caseId").value);
  formData.append("location", document.getElementById("location").value);
  formData.append("officer", document.getElementById("officer").value);
  formData.append("detail", document.getElementById("detail").value);
  formData.append("timestamp", document.getElementById("timestamp").value);
  formData.append("lat", document.getElementById("lat").value);
  formData.append("lng", document.getElementById("lng").value);

  // 🔥 FIX: ส่งเป็น images[]
  if (window.currentImages && window.currentImages.length > 0) {
    window.currentImages.forEach(img => {
      formData.append("images", img);
    });
  }

  const res = await fetch("http://localhost:3001/api/report/pdf", {
    method: "POST",
    body: formData
  });

  const blob = await res.blob();

  const url = window.URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "report.pdf";
  a.click();
});

// ปุ่มกลับหน้า
function goHome() {
  window.location.href = "home.html";
}

// auto select
const params = new URLSearchParams(window.location.search);
const selectedId = params.get("id");

fetch("http://localhost:3001/api/cases")
  .then(res => res.json())
  .then(data => {
    const select = document.getElementById("caseId");
    select.innerHTML = `<option value="">-- เลือกเคส --</option>`;

    data.data.forEach(c => {
      select.innerHTML += `<option value="${c.id}">${c.id}</option>`;
    });

    if (selectedId) {
      select.value = selectedId;
      select.dispatchEvent(new Event("change"));
    }
  });
</script>

</body>
</html>
