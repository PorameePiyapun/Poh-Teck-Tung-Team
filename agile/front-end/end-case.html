<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>End Case</title>
  <link rel="stylesheet" href="end-case.css">
</head>

<body>

<div class="container">
  <div class="card">

    <div class="title">🚑 End Case Report</div>

    <form method="POST" action="http://localhost:3001/api/report/pdf">

      <div class="form-group">
        <label>Case ID</label>
        <select name="caseId" id="caseId" required></select>
      </div>

      <div class="form-group">
        <label>Location</label>
        <input name="location" id="location" readonly>
      </div>

      <div class="form-group">
        <label>Officer</label>
        <input name="officer" id="officer" readonly>
      </div>

      <div class="form-group">
        <label>Detail</label>
        <textarea name="detail" id="detail"></textarea>
      </div>

      <!-- 🔥 ปุ่ม 2 อัน -->
      <div class="btn-group">
        <button type="submit" class="btn primary">
          End Case + Generate PDF
        </button>

        <button type="button" class="btn secondary" onclick="goHome()">
          กลับหน้า Home
        </button>
      </div>

    </form>

  </div>
</div>

<script>
// โหลด case
fetch("http://localhost:3001/api/cases")
  .then(res => res.json())
  .then(data => {
    const select = document.getElementById("caseId");
    select.innerHTML = `<option value="">-- เลือกเคส --</option>`;

    data.data.forEach(c => {
      if (c.status !== "closed") {
        select.innerHTML += `<option value="${c.id}">${c.id}</option>`;
      }
    });
  });

// เลือก case → เติมข้อมูล
document.getElementById("caseId").addEventListener("change", async function () {
  const id = this.value;
  if (!id) return;

  const res = await fetch(`http://localhost:3001/api/cases/${id}`);
  const { data } = await res.json();

  document.getElementById("location").value = data.location || "-";
  document.getElementById("officer").value = "-";

  // 🔥 เพิ่มตรงนี้ (timestamp)
  const ts = document.getElementById("timestamp");
  if (ts) {
    ts.value = data.updatedAt
      ? new Date(data.updatedAt).toLocaleString("th-TH")
      : "-";
  }
});

// 🔥 ปุ่มกลับหน้า
function goHome() {
  window.location.href = "home.html";
}
// 🔥 ดึง caseId จาก URL
const params = new URLSearchParams(window.location.search);
const selectedId = params.get("id");

// 🔥 โหลด case + auto select
fetch("http://localhost:3001/api/cases")
  .then(res => res.json())
  .then(data => {
    const select = document.getElementById("caseId");
    select.innerHTML = `<option value="">-- เลือกเคส --</option>`;

    data.data.forEach(c => {
      select.innerHTML += `<option value="${c.id}">${c.id}</option>`;
    });

    // 🔥 ถ้ามี id ส่งมา → เลือกอัตโนมัติ
    if (selectedId) {
      select.value = selectedId;
      select.dispatchEvent(new Event("change")); // trigger โหลดข้อมูล
    }
  });
</script>

</body>
</html>
